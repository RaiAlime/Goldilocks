<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goldilocks Philippines - Entry</title>
  <link rel="icon" type="image/jpeg" href="goldilocks.jpg">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f7c59f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    form {
      background-color: #ffffff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      width: 350px;
      text-align: center;
    }

    input, textarea, select {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }

    button {
      padding: 10px 20px;
      background-color: #ff8c42;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background-color: #e07b30;
    }

    @media (max-width: 400px) {
      form {
        width: 90%;
      }
    }
  </style>
</head>
<body>

   <form action="home.html" method="get">
    <h2>Welcome to Goldilocks Philippines</h2>
    
    <input type="text" name="name" placeholder="Enter your name" required>
    
    <input type="email" name="email" placeholder="Enter your email" required>
    
    <select name="gender" required>
      <option value="" disabled selected>Select your gender</option>
      <option value="Male">Male</option>
      <option value="Female">Female</option>
      <option value="Other">Other</option>
    </select>
    
    <textarea name="comment" placeholder="Enter your comment" rows="4" required></textarea>
    
    <button type="submit">Enter Site</button>
  </form>

</body>
</html>
